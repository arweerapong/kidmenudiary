<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#FF8A65">
<link rel="manifest" href="./manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>เมนูหนูน้อย 🍚</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFF8EE; --ink:#5b4636; --ink2:#9a8270;
  --coral:#FF8A65; --coral2:#ffe3d8;
  --mint:#7cc6a4; --mint2:#e0f3ea;
  --sun:#FFC75F; --sun2:#fff1d6;
  --berry:#c97bb2; --berry2:#f7e4f1;
  --red:#e35d5d; --card:#fffdf8;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Mali','Segoe UI',sans-serif;font-size:15px;line-height:1.45}
.app{max-width:520px;margin:0 auto;padding:0 12px 92px}
header{position:sticky;top:0;z-index:20;background:var(--bg);padding:10px 2px 6px;display:flex;align-items:center;gap:10px;border-bottom:2px dashed #e8d9c5}
header .logo{width:44px;height:44px;flex:none}
header h1{font-size:19px;margin:0;flex:1;line-height:1.2}
header h1 small{display:block;font-size:11px;color:var(--ink2);font-weight:400}
.iconbtn{background:var(--card);border:2px solid var(--ink);border-radius:14px 16px 13px 17px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink)}
.iconbtn svg{width:21px;height:21px}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--sun2);border:1.6px solid var(--ink);border-radius:14px 18px 15px 17px;padding:3px 11px;font-size:13px;cursor:pointer}
.chip.sel{background:var(--coral);color:#fff}
.chip.warn{background:#fde3e3;border-color:var(--red);color:var(--red)}
.card{background:var(--card);border:2px solid var(--ink);border-radius:18px 22px 17px 23px;padding:13px 14px;margin:11px 0;box-shadow:3px 3px 0 #e9dcc8}
.card.flat{box-shadow:none}
.card h3{margin:0 0 8px;font-size:16px;display:flex;align-items:center;gap:7px}
.card h3 svg{width:20px;height:20px;flex:none}
.btn{font-family:inherit;font-size:14px;font-weight:600;background:var(--card);color:var(--ink);border:2px solid var(--ink);border-radius:13px 17px 14px 18px;padding:8px 15px;cursor:pointer;box-shadow:2px 2px 0 #d9c9b2}
.btn:active{transform:translate(2px,2px);box-shadow:none}
.btn.pri{background:var(--coral);color:#fff}
.btn.mint{background:var(--mint);color:#fff}
.btn.sun{background:var(--sun)}
.btn.sm{font-size:12.5px;padding:5px 11px}
.btn.ghost{box-shadow:none;border-style:dashed;background:transparent}
.btn:disabled{opacity:.45;pointer-events:none}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.row.between{justify-content:space-between}
.muted{color:var(--ink2);font-size:12.5px}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink);background:#fff;border:2px solid var(--ink);border-radius:11px 14px 12px 15px;padding:8px 10px;width:100%;outline:none}
textarea{resize:vertical;min-height:60px}
label.fl{display:block;font-size:12.5px;font-weight:600;margin:9px 0 4px;color:var(--ink2)}
/* bottom nav */
nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:var(--card);border-top:2px solid var(--ink);display:flex;max-width:520px;margin:0 auto;border-radius:22px 22px 0 0;box-shadow:0 -3px 0 #e9dcc8}
nav button{flex:1;background:none;border:none;font-family:inherit;font-size:10.5px;color:var(--ink2);padding:8px 2px 9px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
nav button svg{width:23px;height:23px}
nav button.on{color:var(--coral);font-weight:700}
nav button.on svg{stroke-width:2.4}
/* meal log */
.mealhead{display:flex;align-items:center;gap:8px;margin:14px 2px 4px}
.mealhead .t{font-weight:700;font-size:15px}
.logitem{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1.5px dashed #ecdfca}
.logitem:last-child{border-bottom:none}
.logitem .ic{width:38px;height:38px;flex:none;background:var(--sun2);border:1.8px solid var(--ink);border-radius:12px 14px 11px 15px;display:flex;align-items:center;justify-content:center}
.logitem .ic svg{width:22px;height:22px}
.bar{height:13px;background:#f1e7d6;border:1.6px solid var(--ink);border-radius:8px;overflow:hidden;position:relative}
.bar i{display:block;height:100%;background:var(--mint);border-radius:0 6px 6px 0;transition:width .4s}
.bar.over i{background:var(--sun)}
.nutrow{display:flex;align-items:center;gap:8px;margin:7px 0;font-size:12.5px}
.nutrow .nm{width:74px;flex:none;font-weight:600}
.nutrow .bar{flex:1}
.nutrow .vv{width:96px;flex:none;text-align:right;color:var(--ink2);font-size:11.5px}
/* recipe cards */
.rcard{display:flex;gap:11px;align-items:center;cursor:pointer}
.rcard .ric{width:52px;height:52px;flex:none;background:var(--mint2);border:2px solid var(--ink);border-radius:16px 18px 15px 19px;display:flex;align-items:center;justify-content:center}
.rcard .ric svg{width:32px;height:32px}
.rcard .nm{font-weight:700;font-size:14.5px}
.tag{display:inline-block;font-size:10.5px;background:var(--berry2);border:1.4px solid var(--ink);border-radius:8px 10px 9px 11px;padding:1px 7px;margin:2px 3px 0 0}
.tag.age{background:var(--sun2)}
.tag.al{background:#fde3e3;color:var(--red);border-color:var(--red)}
/* modal */
.mwrap{position:fixed;inset:0;background:rgba(70,50,35,.45);z-index:50;display:none;align-items:flex-end;justify-content:center}
.mwrap.show{display:flex}
.modal{background:var(--bg);width:100%;max-width:520px;max-height:88vh;overflow-y:auto;border-radius:26px 26px 0 0;border:2.5px solid var(--ink);border-bottom:none;padding:16px 16px 28px;animation:up .22s ease}
@keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
.modal h2{font-size:18px;margin:2px 36px 10px 2px}
.mclose{position:absolute;margin-left:auto;float:right;width:34px;height:34px;border-radius:50%;border:2px solid var(--ink);background:#fff;font-size:16px;cursor:pointer;font-family:inherit}
/* tables */
table.nut{width:100%;border-collapse:collapse;font-size:12.5px}
table.nut td{padding:3px 4px;border-bottom:1px dashed #e8d9c5}
table.nut td:last-child{text-align:right;font-weight:600}
.steps{padding-left:0;list-style:none;counter-reset:s}
.steps li{counter-increment:s;display:flex;gap:9px;margin:8px 0;font-size:13.5px}
.steps li::before{content:counter(s);flex:none;width:22px;height:22px;background:var(--coral);color:#fff;border:1.6px solid var(--ink);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.inglist{font-size:13.5px}
.inglist .it{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed #e8d9c5}
/* plan */
.pday{margin:10px 0}
.pday .dt{font-weight:700;font-size:13.5px;margin-bottom:4px}
.pslot{display:flex;gap:6px;flex-wrap:wrap}
.pslot .ps{flex:1;min-width:45%;background:#fff;border:1.7px dashed var(--ink2);border-radius:12px 14px 11px 15px;padding:6px 8px;font-size:12px;cursor:pointer;min-height:44px}
.pslot .ps.has{border-style:solid;border-color:var(--ink);background:var(--mint2)}
.pslot .ps b{display:block;font-size:11px;color:var(--ink2);font-weight:600}
/* stats */
.mchart{display:flex;align-items:flex-end;gap:2px;height:90px;padding:4px 2px;border-bottom:2px solid var(--ink)}
.mchart i{flex:1;background:var(--coral);border-radius:4px 4px 0 0;min-height:2px;opacity:.85}
.mchart i.lo{background:var(--sun)}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.kpi{background:var(--sun2);border:1.8px solid var(--ink);border-radius:14px 17px 13px 18px;padding:8px 10px;text-align:center}
.kpi b{font-size:19px;display:block}
.kpi span{font-size:11px;color:var(--ink2)}
/* trial */
.trow{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1.5px dashed #ecdfca}
.trow:last-child{border-bottom:none}
.dot{width:12px;height:12px;border-radius:50%;border:1.6px solid var(--ink);flex:none}
.dot.try{background:var(--sun)} .dot.pass{background:var(--mint)} .dot.fail{background:var(--red)}
.empty{text-align:center;color:var(--ink2);padding:22px 8px;font-size:13.5px}
.empty svg{width:54px;height:54px;opacity:.5;display:block;margin:0 auto 8px}
.seg{display:flex;gap:0;border:2px solid var(--ink);border-radius:14px;overflow:hidden;background:#fff}
.seg button{flex:1;border:none;background:none;font-family:inherit;font-size:12.5px;padding:7px 4px;cursor:pointer;color:var(--ink2)}
.seg button.on{background:var(--coral);color:#fff;font-weight:700}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:96px;background:var(--ink);color:#fff;padding:9px 18px;border-radius:16px;font-size:13.5px;z-index:99;opacity:0;transition:opacity .25s;pointer-events:none;max-width:88%;text-align:center}
.toast.show{opacity:1}
.ingrow{display:flex;gap:6px;margin:5px 0;align-items:center}
.ingrow select{flex:1}
.ingrow input{width:72px;flex:none}
.ingrow .x{flex:none;width:30px;height:30px;border-radius:50%;border:1.8px solid var(--red);background:#fff;color:var(--red);cursor:pointer;font-family:inherit}
.warnbox{background:#fde3e3;border:2px solid var(--red);border-radius:13px 16px 12px 17px;padding:8px 12px;color:var(--red);font-size:13px;margin:8px 0}
.okbox{background:var(--mint2);border:2px solid var(--mint);border-radius:13px 16px 12px 17px;padding:8px 12px;font-size:13px;margin:8px 0}
h4.sec{margin:16px 2px 6px;font-size:14px;color:var(--ink2)}
</style>
</head>

const MEALIC={br:'i-egg',lu:'i-bowl',di:'i-pot',sn:'i-apple',mi:'i-milk'};
const EATEN=[[1,'หมดเกลี้ยง 😋'],[0.75,'เกือบหมด'],[0.5,'ครึ่งหนึ่ง'],[0.25,'นิดหน่อย'],[0,'ไม่ยอมกิน']];
const $=q=>document.querySelector(q);

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
function dstr(d){d=d||new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
const THD=['อา','จ','อ','พ','พฤ','ศ','ส'];
const THM=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
function thDate(s){const d=new Date(s+'T00:00');return THD[d.getDay()]+'. '+d.getDate()+' '+THM[d.getMonth()]}
let S;
function load(){try{S=JSON.parse(localStorage.getItem('kidmenu'))}catch(e){}
 if(!S)S={children:[],active:null,logs:[],recipes:[],trials:[],plans:{},growth:[]};
 S.recipes=S.recipes||[];S.trials=S.trials||[];S.plans=S.plans||{};S.logs=S.logs||[];S.growth=S.growth||[];S.ings=S.ings||[];mergeIngs();}
function save(){localStorage.setItem('kidmenu',JSON.stringify(S))}
function child(){return S.children.find(c=>c.id===S.active)}
function ageM(c){c=c||child();if(!c)return 12;const b=new Date(c.bd+'T00:00'),n=new Date();
 let m=(n.getFullYear()-b.getFullYear())*12+n.getMonth()-b.getMonth();if(n.getDate()<b.getDate())m--;return Math.max(0,m)}
function ageTxt(m){const y=Math.floor(m/12),mm=m%12;
 return y?(y+' ขวบ'+(mm?' '+mm+' เดือน':'')):(m+' เดือน')}
function allRecipes(){return RECIPES.concat(S.recipes)}
function getRecipe(id){return allRecipes().find(r=>r.id===id)}
function nutOf(ings){const t=[0,0,0,0,0,0,0,0];
 (ings||[]).forEach(([id,g])=>{const it=ING[id];if(!it)return;it.v.forEach((v,i)=>t[i]+=v*g/100)});return t}
function target(){const m=ageM();
 return m<12?{kcal:700,prot:15,fe:9,ca:270,va:400,vc:50}:{kcal:1000,prot:18,fe:6,ca:500,va:400,vc:30}}
function failedAllergens(){const c=child();if(!c)return[];
 return S.trials.filter(t=>t.child===c.id&&t.status==='fail').map(t=>t.ing?(ING[t.ing]?.a||ING[t.ing]?.n):t.name).filter(Boolean)
 .concat(c.allergies||[])}
function recipeAllergens(r){return [...new Set(r.ings.map(([id])=>ING[id]?.a).filter(Boolean))]}
function recipeRisk(r){const bad=failedAllergens();
 return r.ings.some(([id])=>{const it=ING[id];return it&&(bad.includes(it.a)||bad.includes(it.n))})}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2200)}
function fmt(n,d=0){return Number(n).toLocaleString('th-TH',{maximumFractionDigits:d,minimumFractionDigits:0})}
function svg(id,st){return `<svg viewBox="0 0 32 32" ${st?`style="${st}"`:''}><use href="#${id}"/></svg>`}
function ingOptions(sel){let h='<option value="">– เลือกวัตถุดิบ –</option>';const gs={};
 Object.entries(ING).forEach(([id,it])=>{(gs[it.g]=gs[it.g]||[]).push([id,it])});
 Object.entries(gs).forEach(([g,arr])=>{h+=`<optgroup label="${g}">`+arr.map(([id,it])=>`<option value="${id}" ${id===sel?'selected':''}>${it.n}${it.custom?' ★':''}${it.a?' ⚠️':''}</option>`).join('')+'</optgroup>'});
 return h}

const ALLERGENS=['ไข่','นมวัว','แป้งสาลี','ถั่วเหลือง','ปลา','กุ้ง/สัตว์น้ำมีเปลือก','ถั่วลิสง','ถั่วเปลือกแข็ง','งา'];
function ingManager(){let h=`<h2>🧺 วัตถุดิบของฉัน</h2>
 <p class="muted" style="font-size:12.5px;margin:4px 0 8px">เพิ่มวัตถุดิบที่ไม่มีในฐานข้อมูล พร้อมค่าโภชนาการต่อ 100 กรัม (ดูจากฉลากอาหารหรือค้นเว็บได้) แล้วเลือกใช้ได้ทุกที่ในแอป — รายการที่เพิ่มเองจะมีเครื่องหมาย ★</p>
 <button class="btn pri sm" onclick="ingForm()">＋ เพิ่มวัตถุดิบใหม่</button>`;
 if(S.ings.length){h+='<div class="card" style="margin-top:10px">';
  S.ings.forEach(it=>{h+=`<div class="trow"><div style="flex:1"><b>${esc(it.n)}</b> <span class="tag">${esc(it.g)}</span>${it.a?`<span class="tag al">${esc(it.a)}</span>`:''}
   <div class="muted">${fmt(it.v[0])} กิโลแคลอรี · โปรตีน ${fmt(it.v[1],1)} ก. ต่อ 100 ก.</div></div>
   <button class="btn sm" onclick="ingForm('${it.id}')">✏️</button><button class="x" onclick="delIng('${it.id}')">✕</button></div>`});
  h+='</div>'}
 else h+=`<div class="empty">ยังไม่มีวัตถุดิบที่เพิ่มเอง</div>`;
 openModal(h)}
function ingForm(editId){const ed=editId?S.ings.find(x=>x.id===editId):null;
 const NL=[['พลังงาน (กิโลแคลอรี)',0],['โปรตีน (ก.)',1],['ไขมัน (ก.)',2],['คาร์โบไฮเดรต (ก.)',3],['ธาตุเหล็ก (มก.)',4],['แคลเซียม (มก.)',5],['วิตามินเอ (µg)',6],['วิตามินซี (มก.)',7]];
 const ax=ed&&ed.a&&!ALLERGENS.includes(ed.a);
 openModal2(`<h2>${ed?'แก้ไขวัตถุดิบ':'เพิ่มวัตถุดิบใหม่'}</h2>
  <label class="fl">ชื่อวัตถุดิบ</label><input id="if-n" value="${ed?esc(ed.n):''}" placeholder="เช่น ปลาช่อน, เมล็ดเจีย">
  <label class="fl">หมวด</label><select id="if-g">${['โปรตีน','ผัก','ผลไม้','แป้ง','นม','ไขมัน','อื่นๆ'].map(g=>`<option ${ed&&ed.g===g?'selected':''}>${g}</option>`).join('')}</select>
  <label class="fl">สารก่อภูมิแพ้ (ถ้ามี)</label>
  <select id="if-a" onchange="document.getElementById('if-ax').style.display=this.value==='__x'?'block':'none'">
   <option value="">– ไม่มี –</option>${ALLERGENS.map(a=>`<option ${ed&&ed.a===a?'selected':''}>${a}</option>`).join('')}<option value="__x" ${ax?'selected':''}>ระบุเอง...</option></select>
  <input id="if-ax" value="${ax?esc(ed.a):''}" placeholder="พิมพ์ชื่อสารก่อภูมิแพ้" style="display:${ax?'block':'none'};margin-top:5px">
  <label class="fl">คุณค่าทางโภชนาการ ต่อ 100 กรัม (ไม่ทราบใส่ 0 ได้)</label>
  <div class="kpis">${NL.map(([lb,i])=>`<div><label class="fl" style="margin:3px 0 2px">${lb}</label><input id="if-v${i}" type="number" min="0" step="0.01" value="${ed?ed.v[i]:''}" placeholder="0"></div>`).join('')}</div>
  <button class="btn pri" style="width:100%;margin-top:13px" onclick="saveIng('${editId||''}')">💾 บันทึกวัตถุดิบ</button>`)}
function saveIng(editId){const n=$('#if-n').value.trim();
 if(!n){toast('ใส่ชื่อวัตถุดิบก่อนนะคะ');return}
 const v=[];for(let i=0;i<8;i++)v.push(+document.getElementById('if-v'+i).value||0);
 let a=$('#if-a').value;if(a==='__x')a=$('#if-ax').value.trim();
 const data={n,g:$('#if-g').value,a:a||null,v};
 if(editId)Object.assign(S.ings.find(x=>x.id===editId),data);
 else S.ings.push({id:'c'+uid(),...data});
 mergeIngs();save();closeModal2();toast('บันทึกวัตถุดิบแล้ว 🧺');
 if($('#lg-ings'))drawLogIngs();if($('#rf-ings'))drawRIngs();
 if(($('#modal').innerHTML||'').includes('วัตถุดิบของฉัน'))ingManager()}
function delIng(id){
 const used=allRecipes().some(r=>r.ings.some(x=>x[0]===id))||S.logs.some(l=>(l.ings||[]).some(x=>x[0]===id));
 if(used){toast('ลบไม่ได้ มีเมนูหรือบันทึกที่ใช้วัตถุดิบนี้อยู่');return}
 if(!confirm('ลบวัตถุดิบนี้?'))return;
 S.ings=S.ings.filter(x=>x.id!==id);delete ING[id];save();ingManager()}

let TODAY_DATE=dstr();
function renderToday(){const c=child(),m=ageM(),t=target();
 const logs=S.logs.filter(l=>l.child===c.id&&l.date===TODAY_DATE);
 const tot=[0,0,0,0,0,0,0,0];
 logs.forEach(l=>nutOf(l.ings).forEach((v,i)=>tot[i]+=v*(l.eaten??1)));
 const NUTBARS=[['kcal',0,t.kcal,'กิโลแคลอรี'],['prot',1,t.prot,'กรัม'],['fe',4,t.fe,'มก.'],['ca',5,t.ca,'มก.'],['va',6,t.va,'µg'],['vc',7,t.vc,'มก.']];
 const names={kcal:'พลังงาน',prot:'โปรตีน',fe:'เหล็ก',ca:'แคลเซียม',va:'วิต.เอ',vc:'วิต.ซี'};
 let h=`<div class="row between" style="margin-top:10px">
   <button class="btn sm ghost" onclick="shiftDay(-1)">‹ ก่อนหน้า</button>
   <b>${TODAY_DATE===dstr()?'วันนี้ · ':''}${thDate(TODAY_DATE)}</b>
   <button class="btn sm ghost" onclick="shiftDay(1)" ${TODAY_DATE>=dstr()?'disabled':''}>ถัดไป ›</button>
 </div>`;
 // สรุปโภชนาการวันนี้
 h+=`<div class="card"><h3>${svg('i-chart','width:20px;color:var(--mint)')} สารอาหารที่ได้รับ <span class="muted" style="font-weight:400;font-size:11px">(เทียบเป้าหมาย/วัน วัย ${ageTxt(m)})</span></h3>`;
 NUTBARS.forEach(([k,i,tg,u])=>{const p=Math.min(100,tot[i]/tg*100);
  h+=`<div class="nutrow"><span class="nm">${names[k]}</span><span class="bar ${tot[i]>tg*1.3?'over':''}"><i style="width:${p}%"></i></span><span class="vv">${fmt(tot[i],1)}/${fmt(tg)} ${u}</span></div>`});
 h+=`<div class="muted" style="font-size:11px">* เป้าหมายโดยประมาณ รวมพลังงานจากนมแม่/นมผงด้วย ${m<12?'(วัยนี้นมยังเป็นอาหารหลัก)':''}</div></div>`;
 // มื้ออาหาร
 Object.entries(MEALS).forEach(([mk,mn])=>{const ml=logs.filter(l=>l.meal===mk);
  h+=`<div class="mealhead"><svg viewBox="0 0 32 32" style="width:20px;height:20px;color:var(--coral)"><use href="#${MEALIC[mk]}"/></svg><span class="t">${mn}</span>

  if(!ml.length){h+=`<div class="muted" style="padding:2px 6px 6px">ยังไม่มีบันทึก</div>`}
  else{h+='<div class="card flat" style="margin:4px 0 10px">';
   ml.forEach(l=>{const n=nutOf(l.ings),e=EATEN.find(x=>x[0]===(l.eaten??1));
    h+=`<div class="logitem" onclick="logDetail('${l.id}')" style="cursor:pointer">

      <div class="muted">${fmt(n[0]*(l.eaten??1))} กิโลแคลอรี · โปรตีน ${fmt(n[1]*(l.eaten??1),1)} ก. · กิน${e?e[1]:''}</div>
      ${l.react?`<div style="color:var(--red);font-size:12px">⚠️ ${esc(l.react)}</div>`:''}</div>
    </div>`});
   h+='</div>'}});
 // แผนของวันนี้
 const plan=(S.plans[c.id]||{})[TODAY_DATE];
 if(plan&&Object.values(plan).some(Boolean)){h+=`<div class="card" style="background:var(--mint2)"><h3>${svg('i-cal','width:19px')} ตามแผนวันนี้</h3>`;

  h+='</div>'}
 $('#view').innerHTML=h}
function shiftDay(d){const x=new Date(TODAY_DATE+'T00:00');x.setDate(x.getDate()+d);TODAY_DATE=dstr(x);renderToday()}

/* ===== ฟอร์มบันทึกมื้อ ===== */
function logForm(mk,editId){const c=child(),m=ageM();
 const ed=editId?S.logs.find(l=>l.id===editId):null;
 const recs=allRecipes().filter(r=>m>=r.a[0]&&m<=r.a[1]+(m>=12?24:2));
 let rows=ed?ed.ings.map(x=>[...x]):[['',0]];
 window._logIngs=rows;
 const recOpts=allRecipes().sort((a,b)=>a.n.localeCompare(b.n,'th')).map(r=>`<option value="${r.id}" ${ed&&ed.rid===r.id?'selected':''}>${r.n} (${r.a[0]}–${r.a[1]} ด.)</option>`).join('');
 openModal(`<h2>${ed?'แก้ไขบันทึก':'บันทึก'+MEALS[mk]}</h2>
  ${mk==='mi'?`<div class="row" style="margin-bottom:6px">
    <button class="btn sm mint" onclick="milkQuick('bmilk')">นมแม่</button>
    <button class="btn sm mint" onclick="milkQuick('fmilk')">นมผง</button>
    <button class="btn sm mint" onclick="milkQuick('cmilk')">นมวัวสด</button></div>`:''}
  <label class="fl">เลือกจากคลังเมนู (หรือพิมพ์ชื่อเองด้านล่าง)</label>
  <select id="lg-rec" onchange="logPickRecipe()"><option value="">– เมนูกำหนดเอง –</option>${recOpts}</select>
  <label class="fl">ชื่อเมนู</label>
  <input id="lg-name" value="${ed?esc(ed.name):''}" placeholder="เช่น โจ๊กหมูใส่ไข่">
  <label class="fl">วัตถุดิบ + ปริมาณ (กรัม/มล.) — ใช้คำนวณสารอาหาร</label>
  <div id="lg-ings"></div>
  <button class="btn sm ghost" onclick="window._logIngs.push(['',0]);drawLogIngs()">＋ เพิ่มวัตถุดิบ</button>
  <button class="btn sm ghost" onclick="ingForm()">🆕 สร้างวัตถุดิบใหม่</button>
  <div id="lg-nut" class="muted" style="margin-top:6px"></div>
  <div id="lg-warn"></div>
  <label class="fl">กินไปเท่าไหร่</label>
  <div class="seg" id="lg-eaten">${EATEN.map(([v,n],i)=>`<button class="${(ed?ed.eaten:1)===v?'on':''}" data-v="${v}" onclick="segSel(this)">${n}</button>`).join('')}</div>
  <label class="fl">ปฏิกิริยา/อาการ (ถ้ามี เช่น ผื่น คัน ถ่ายเหลว)</label>
  <input id="lg-react" value="${ed?esc(ed.react):''}" placeholder="ปล่อยว่างถ้าปกติดี">
  <label class="fl">โน้ตเพิ่มเติม</label>
  <input id="lg-note" value="${ed?esc(ed.note||''):''}" placeholder="เช่น ชอบมาก ขอเพิ่ม">
  <div class="row" style="margin-top:14px">
   <button class="btn pri" style="flex:1" onclick="saveLog('${mk}','${editId||''}')">💾 บันทึก</button>
   ${ed?`<button class="btn" style="color:var(--red);border-color:var(--red)" onclick="delLog('${editId}')">ลบ</button>`:''}
  </div>`);
 drawLogIngs()}
function milkQuick(id){window._logIngs=[[id,150]];$('#lg-name').value=ING[id].n+' 150 มล.';drawLogIngs()}
function segSel(b){[...b.parentNode.children].forEach(x=>x.classList.remove('on'));b.classList.add('on')}
function logPickRecipe(){const rid=$('#lg-rec').value;if(!rid)return;const r=getRecipe(rid);
 $('#lg-name').value=r.n;window._logIngs=r.ings.map(x=>[...x]);drawLogIngs()}
function drawLogIngs(){const el=$('#lg-ings');if(!el)return;
 el.innerHTML=window._logIngs.map((ig,i)=>`<div class="ingrow">
   <select onchange="window._logIngs[${i}][0]=this.value;drawLogIngs()">${ingOptions(ig[0])}</select>
   <input type="number" min="0" value="${ig[1]||''}" placeholder="กรัม" oninput="window._logIngs[${i}][1]=+this.value;updLogNut()">
   <button class="x" onclick="window._logIngs.splice(${i},1);drawLogIngs()">✕</button></div>`).join('');
 updLogNut()}
function updLogNut(){const el=$('#lg-nut');if(!el)return;const n=nutOf(window._logIngs.filter(x=>x[0]));
 el.innerHTML=`รวม: <b>${fmt(n[0])} กิโลแคลอรี</b> · โปรตีน ${fmt(n[1],1)} ก. · เหล็ก ${fmt(n[4],1)} มก. · แคลเซียม ${fmt(n[5])} มก.`;
 const bad=failedAllergens();const w=$('#lg-warn');
 const hit=window._logIngs.map(x=>ING[x[0]]).filter(it=>it&&(bad.includes(it.a)||bad.includes(it.n)));
 w.innerHTML=hit.length?`<div class="warnbox">⚠️ ระวัง! มีวัตถุดิบที่ลูกเคยแพ้: ${[...new Set(hit.map(h=>h.n))].join(', ')}</div>`:''}
function saveLog(mk,editId){const name=$('#lg-name').value.trim();
 if(!name){toast('ใส่ชื่อเมนูก่อนนะคะ');return}
 const eaten=+($('#lg-eaten .on')?.dataset.v??1);
 const ings=window._logIngs.filter(x=>x[0]&&x[1]>0);
 const rid=$('#lg-rec').value||null;
 const data={child:S.active,date:TODAY_DATE,meal:mk,name,rid,ings,eaten,react:$('#lg-react').value.trim(),note:$('#lg-note').value.trim()};
 if(editId){const l=S.logs.find(x=>x.id===editId);Object.assign(l,data)}
 else S.logs.push({id:uid(),...data});
 if(data.react){ // บันทึกอาการแพ้ลง trial อัตโนมัติถ้าตรงกับอาหารที่กำลังลอง
  S.trials.filter(t=>t.child===S.active&&t.status==='try').forEach(t=>{
   if(ings.some(([id])=>id===t.ing)){t.note=(t.note?t.note+' | ':'')+TODAY_DATE+': '+data.react}})}
 save();closeModal();toast('บันทึกเรียบร้อย 🎉');renderToday()}
function delLog(id){if(!confirm('ลบบันทึกนี้?'))return;S.logs=S.logs.filter(l=>l.id!==id);save();closeModal();renderToday()}
function logDetail(id){const l=S.logs.find(x=>x.id===id);if(!l)return;
 TODAY_DATE=l.date;logForm(l.meal,id)}
/* ================= หน้า: คลังเมนู ================= */
let MENU_Q='',MENU_AGE='fit';
function renderMenu(){const m=ageM();
 const made={};S.logs.filter(l=>l.child===S.active&&l.rid).forEach(l=>made[l.rid]=(made[l.rid]||0)+1);
 let list=allRecipes();
 if(MENU_AGE==='fit')list=list.filter(r=>m>=r.a[0]&&m<=r.a[1]);
 if(MENU_Q)list=list.filter(r=>r.n.includes(MENU_Q)||r.ings.some(([id])=>ING[id]?.n.includes(MENU_Q)));
 list.sort((a,b)=>a.a[0]-b.a[0]);
 let h=`<div class="row" style="margin-top:12px">
  <div style="flex:1;position:relative">
   <input placeholder="ค้นหาเมนู / วัตถุดิบ..." value="${esc(MENU_Q)}" oninput="MENU_Q=this.value;renderMenu()" style="padding-left:34px">
   <svg viewBox="0 0 32 32" style="width:17px;height:17px;position:absolute;left:11px;top:11px;color:var(--ink2)"><use href="#i-search"/></svg>
  </div>
  <button class="btn sm ${MENU_AGE==='fit'?'pri':''}" onclick="MENU_AGE=MENU_AGE==='fit'?'all':'fit';renderMenu()">${MENU_AGE==='fit'?'วัย '+ageTxt(m):'ทุกวัย'}</button>
 </div>
 <div class="row" style="margin-top:9px">
  <button class="btn mint sm" onclick="randomMenu()">${svg('i-dice','width:16px;height:16px;vertical-align:-3px')} สุ่มเมนูวันนี้</button>
  <button class="btn sun sm" onclick="recipeForm()">＋ เพิ่มเมนูของฉัน</button>
  <button class="btn sm" onclick="ingManager()">🧺 วัตถุดิบ${S.ings.length?' ('+S.ings.length+')':''}</button>
 </div>`;
 if(!list.length)h+=`<div class="empty">${svg('i-search')}ไม่พบเมนูที่ค้นหา</div>`;
 list.forEach(r=>{const n=nutOf(r.ings),risk=recipeRisk(r),als=recipeAllergens(r);
  h+=`<div class="card rcard" onclick="recipeDetail('${r.id}')">
   <div class="ric" style="background:${risk?'#fde3e3':'var(--mint2)'}"><svg viewBox="0 0 32 32"><use href="#${r.ic||'i-bowl'}"/></svg></div>
   <div style="flex:1">
    <div class="nm">${esc(r.n)} ${r.id[0]==='u'?'<span class="tag" style="background:var(--coral2)">เมนูของฉัน</span>':''}</div>
    <div><span class="tag age">${r.a[0]}–${r.a[1]} เดือน</span><span class="tag">${esc(r.tx)}</span>
     ${als.map(a=>`<span class="tag al">${a}</span>`).join('')}
     ${made[r.id]?`<span class="tag" style="background:var(--mint2)">ทำแล้ว ${made[r.id]} ครั้ง</span>`:''}</div>
    <div class="muted" style="margin-top:2px">${fmt(n[0])} กิโลแคลอรี · โปรตีน ${fmt(n[1],1)} ก.</div>
   </div></div>`});
 $('#view').innerHTML=h}

function randomMenu(){const m=ageM(),bad=failedAllergens();
 const pool=allRecipes().filter(r=>m>=r.a[0]&&m<=r.a[1]&&!recipeRisk(r));
 if(!pool.length){toast('ไม่มีเมนูที่เหมาะกับวัยนี้');return}
 const pick=k=>{const p=pool.filter(r=>k==='sn'?r.tx==='ของว่าง':r.tx!=='ของว่าง');return p.length?p[Math.floor(Math.random()*p.length)]:null};
 const sel={br:pick('br'),lu:pick('lu'),di:pick('di'),sn:pick('sn')};
 let h=`<h2>🎲 เมนูแนะนำวันนี้</h2><p class="muted">สุ่มจากเมนูที่เหมาะกับวัย ${ageTxt(m)} และเลี่ยงของที่เคยแพ้</p>`;
 Object.entries(sel).forEach(([mk,r])=>{if(!r)return;const n=nutOf(r.ings);
  h+=`<div class="card flat rcard" style="margin:8px 0" onclick="closeModal();recipeDetail('${r.id}')">
   <div class="ric"><svg viewBox="0 0 32 32"><use href="#${r.ic}"/></svg></div>
   <div><b style="font-size:12px;color:var(--ink2)">${MEALS[mk]}</b><div class="nm">${esc(r.n)}</div>
   <div class="muted">${fmt(n[0])} กิโลแคลอรี</div></div></div>`});
 h+=`<div class="row" style="margin-top:12px">
  <button class="btn mint" style="flex:1" onclick="randomToPlan(${JSON.stringify(Object.fromEntries(Object.entries(sel).filter(([k,v])=>v).map(([k,v])=>[k,v.id]))).replace(/"/g,'&quot;')})">📌 ใส่ลงแผนวันนี้</button>
  <button class="btn" onclick="randomMenu()">สุ่มใหม่</button></div>`;
 openModal(h)}
function randomToPlan(sel){const c=child();S.plans[c.id]=S.plans[c.id]||{};
 S.plans[c.id][dstr()]=Object.assign(S.plans[c.id][dstr()]||{},sel);
 save();closeModal();toast('ใส่ลงแผนแล้ว 📌');go('plan')}

function recipeDetail(id){const r=getRecipe(id);if(!r)return;
 const n=nutOf(r.ings),risk=recipeRisk(r),als=recipeAllergens(r);
 const hist=S.logs.filter(l=>l.child===S.active&&l.rid===id).sort((a,b)=>b.date.localeCompare(a.date));
 let h=`<h2>${esc(r.n)}</h2>
  <div><span class="tag age">เหมาะกับ ${r.a[0]}–${r.a[1]} เดือน</span><span class="tag">เนื้อสัมผัส: ${esc(r.tx)}</span>
  ${als.map(a=>`<span class="tag al">มี${a}</span>`).join('')}</div>
  ${risk?`<div class="warnbox">⚠️ เมนูนี้มีวัตถุดิบที่ลูกเคยแพ้!</div>`:''}
  ${r.tip?`<div class="okbox">💡 ${esc(r.tip)}</div>`:''}
  <h4 class="sec">ส่วนประกอบ (1 ที่)</h4><div class="inglist card flat" style="margin:4px 0">`;
 r.ings.forEach(([iid,g])=>{const it=ING[iid];if(it)h+=`<div class="it"><span>${it.n}${it.a?` <span class="tag al">${it.a}</span>`:''}</span><b>${g} ก.</b></div>`});
 h+=`</div><h4 class="sec">สารอาหารที่ได้รับ (เต็มจาน)</h4><div class="card flat" style="margin:4px 0"><table class="nut">`;
 NUTL.forEach(([k,nm,u],i)=>{h+=`<tr><td>${nm}</td><td>${fmt(n[i],1)} ${u}</td></tr>`});
 h+=`</table></div>`;
 if(r.steps){h+=`<h4 class="sec">วิธีทำ</h4><ol class="steps">${r.steps.map(s=>`<li>${esc(s)}</li>`).join('')}</ol>`}
 if(hist.length)h+=`<h4 class="sec">เคยทำให้กิน ${hist.length} ครั้ง ล่าสุด ${thDate(hist[0].date)}</h4>`;
 h+=`<div class="row" style="margin-top:12px">
  <button class="btn pri" style="flex:1" onclick="closeModal();TODAY_DATE=dstr();logFromRecipe('${r.id}')">🍽️ บันทึกว่ากินมื้อนี้</button>
  <button class="btn mint" onclick="addToPlanPicker('${r.id}')">📌 ใส่แผน</button></div>
  ${r.id[0]==='u'?`<div class="row" style="margin-top:8px"><button class="btn sm" onclick="recipeForm('${r.id}')">✏️ แก้ไข</button><button class="btn sm" style="color:var(--red);border-color:var(--red)" onclick="delRecipe('${r.id}')">ลบเมนู</button></div>`:''}`;
 openModal(h)}
function logFromRecipe(rid){const h=new Date().getHours();
 const mk=h<10?'br':h<14?'lu':h<17?'sn':'di';
 logForm(mk);setTimeout(()=>{$('#lg-rec').value=rid;logPickRecipe()},50)}
function delRecipe(id){if(!confirm('ลบเมนูนี้?'))return;S.recipes=S.recipes.filter(r=>r.id!==id);save();closeModal();renderMenu()}

/* ===== เพิ่ม/แก้เมนูเอง ===== */
function recipeForm(editId){const ed=editId?getRecipe(editId):null;
 window._rIngs=ed?ed.ings.map(x=>[...x]):[['',0]];
 openModal(`<h2>${ed?'แก้ไขเมนู':'เพิ่มเมนูของฉัน'}</h2>
  <label class="fl">ชื่อเมนู</label><input id="rf-name" value="${ed?esc(ed.n):''}" placeholder="เช่น ข้าวตุ๋นปลาช่อน">
  <div class="row"><div style="flex:1"><label class="fl">เหมาะตั้งแต่ (เดือน)</label><input id="rf-a0" type="number" min="6" max="36" value="${ed?ed.a[0]:12}"></div>
  <div style="flex:1"><label class="fl">ถึง (เดือน)</label><input id="rf-a1" type="number" min="6" max="36" value="${ed?ed.a[1]:36}"></div></div>
  <label class="fl">เนื้อสัมผัส</label>
  <select id="rf-tx">${['บดละเอียด','บดหยาบ','สับหยาบ','นุ่มเป็นชิ้น','ฟิงเกอร์ฟู้ด','ข้าวนุ่ม','ของว่าง','ปกติหั่นเล็ก'].map(t=>`<option ${ed&&ed.tx===t?'selected':''}>${t}</option>`).join('')}</select>
  <label class="fl">วัตถุดิบ + กรัม</label><div id="rf-ings"></div>
  <button class="btn sm ghost" onclick="window._rIngs.push(['',0]);drawRIngs()">＋ เพิ่มวัตถุดิบ</button>
  <button class="btn sm ghost" onclick="ingForm()">🆕 สร้างวัตถุดิบใหม่</button>
  <div id="rf-nut" class="muted" style="margin-top:5px"></div>
  <label class="fl">วิธีทำ (1 บรรทัดต่อ 1 ขั้นตอน)</label>
  <textarea id="rf-steps" rows="4" placeholder="ต้มข้าวจนนุ่ม&#10;ใส่หมูสับ...">${ed&&ed.steps?esc(ed.steps.join('\n')):''}</textarea>
  <button class="btn pri" style="width:100%;margin-top:13px" onclick="saveRecipe('${editId||''}')">💾 บันทึกเมนู</button>`);
 drawRIngs()}
function drawRIngs(){const el=$('#rf-ings');if(!el)return;
 el.innerHTML=window._rIngs.map((ig,i)=>`<div class="ingrow">
  <select onchange="window._rIngs[${i}][0]=this.value;drawRIngs()">${ingOptions(ig[0])}</select>
  <input type="number" min="0" value="${ig[1]||''}" placeholder="กรัม" oninput="window._rIngs[${i}][1]=+this.value;updRNut()">
  <button class="x" onclick="window._rIngs.splice(${i},1);drawRIngs()">✕</button></div>`).join('');updRNut()}
function updRNut(){const el=$('#rf-nut');if(!el)return;const n=nutOf(window._rIngs.filter(x=>x[0]));
 el.innerHTML=`รวม: <b>${fmt(n[0])} กิโลแคลอรี</b> · โปรตีน ${fmt(n[1],1)} ก. · เหล็ก ${fmt(n[4],1)} มก.`}
function saveRecipe(editId){const n=$('#rf-name').value.trim();
 if(!n){toast('ใส่ชื่อเมนูก่อนนะคะ');return}
 const ings=window._rIngs.filter(x=>x[0]&&x[1]>0);
 if(!ings.length){toast('เพิ่มวัตถุดิบอย่างน้อย 1 อย่าง');return}
 const data={n,a:[+$('#rf-a0').value||6,+$('#rf-a1').value||36],tx:$('#rf-tx').value,ic:'i-star',ings,
  steps:$('#rf-steps').value.split('\n').map(s=>s.trim()).filter(Boolean)};
 if(editId){Object.assign(getRecipe(editId),data)}else S.recipes.push({id:'u'+uid(),...data});
 save();closeModal();toast('บันทึกเมนูแล้ว ⭐');renderMenu()}

/* ================= หน้า: แผนสัปดาห์ ================= */
function renderPlan(){const c=child(),m=ageM();
 const plans=S.plans[c.id]||{};
 let h=`<div class="row between" style="margin-top:12px"><h3 style="margin:0">📅 แผนเมนู 7 วัน</h3>
  <button class="btn mint sm" onclick="autoPlanWeek()">${svg('i-dice','width:15px;height:15px;vertical-align:-3px')} สุ่มทั้งสัปดาห์</button></div>
  <p class="muted" style="margin:4px 2px">แตะช่องเพื่อเลือกเมนู · เมนูจะกรองตามวัย ${ageTxt(m)}</p>`;
 for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()+i);const ds=dstr(d);
  const p=plans[ds]||{};
  h+=`<div class="card pday"><div class="dt">${i===0?'วันนี้':i===1?'พรุ่งนี้':''} ${thDate(ds)}</div><div class="pslot">`;
  ['br','lu','di','sn'].forEach(mk=>{const r=p[mk]&&getRecipe(p[mk]);
   h+=`<div class="ps ${r?'has':''}" onclick="planPick('${ds}','${mk}')"><b>${MEALS[mk]}</b>${r?esc(r.n):'<span class="muted">＋ เลือก</span>'}</div>`});
  h+='</div></div>'}
 $('#view').innerHTML=h}
function autoPlanWeek(){const c=child(),m=ageM();
 const pool=allRecipes().filter(r=>m>=r.a[0]&&m<=r.a[1]&&!recipeRisk(r));
 const main=pool.filter(r=>r.tx!=='ของว่าง'),sn=pool.filter(r=>r.tx==='ของว่าง');
 if(!main.length){toast('ยังไม่มีเมนูเหมาะกับวัยนี้');return}
 S.plans[c.id]=S.plans[c.id]||{};
 const pk=a=>a.length?a[Math.floor(Math.random()*a.length)].id:null;
 for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()+i);
  S.plans[c.id][dstr(d)]={br:pk(main),lu:pk(main),di:pk(main),sn:pk(sn.length?sn:main)}}
 save();toast('จัดแผนให้แล้ว 🎉 ปรับแก้ได้ตามใจ');renderPlan()}
function planPick(ds,mk){const m=ageM();
 const list=allRecipes().filter(r=>m>=r.a[0]&&m<=r.a[1]).sort((a,b)=>a.n.localeCompare(b.n,'th'));
 let h=`<h2>เลือกเมนู ${MEALS[mk]} · ${thDate(ds)}</h2>`;
 h+=`<button class="btn sm ghost" style="margin-bottom:6px" onclick="setPlan('${ds}','${mk}','')">🗑️ ล้างช่องนี้</button>`;
 list.forEach(r=>{const risk=recipeRisk(r);
  h+=`<div class="card flat rcard" style="margin:7px 0" onclick="setPlan('${ds}','${mk}','${r.id}')">
   <div class="ric" style="width:42px;height:42px;background:${risk?'#fde3e3':'var(--mint2)'}"><svg viewBox="0 0 32 32" style="width:26px;height:26px"><use href="#${r.ic}"/></svg></div>
   <div><div class="nm" style="font-size:13.5px">${esc(r.n)}${risk?' ⚠️':''}</div><span class="muted">${r.a[0]}–${r.a[1]} ด. · ${esc(r.tx)}</span></div></div>`});
 openModal(h)}
function setPlan(ds,mk,rid){const c=child();S.plans[c.id]=S.plans[c.id]||{};
 S.plans[c.id][ds]=S.plans[c.id][ds]||{};S.plans[c.id][ds][mk]=rid||null;
 save();closeModal();renderPlan()}
/* ================= หน้า: ลองอาหารใหม่ / ภูมิแพ้ ================= */
function renderNewfood(){const c=child();
 const ts=S.trials.filter(t=>t.child===c.id).sort((a,b)=>b.start.localeCompare(a.start));
 const trying=ts.filter(t=>t.status==='try'),pass=ts.filter(t=>t.status==='pass'),fail=ts.filter(t=>t.status==='fail');
 const dayOf=t=>Math.min(9,Math.floor((new Date(dstr()+'T00:00')-new Date(t.start+'T00:00'))/864e5)+1);
 let h=`<div class="card" style="background:var(--sun2)"><h3>${svg('i-leaf','width:19px;color:var(--mint)')} กฎ 3 วัน</h3>
  <p style="font-size:13px;margin:0">เริ่มอาหารใหม่<b>ทีละ 1 อย่าง</b> ให้ติดต่อกัน 3 วัน สังเกตผื่น อาเจียน ถ่ายเหลว หรือหายใจครืดคราด ถ้าปกติดีถือว่า "ผ่าน" แล้วค่อยเริ่มอย่างถัดไป ลองตอนมื้อเช้า/กลางวันจะสังเกตอาการได้ทั้งวัน</p></div>
  <button class="btn pri" style="width:100%" onclick="trialForm()">＋ เริ่มลองอาหารใหม่</button>`;
 if(trying.length){h+=`<h4 class="sec">🟡 กำลังลอง</h4><div class="card">`;
  trying.forEach(t=>{const d=dayOf(t);
   h+=`<div class="trow"><span class="dot try"></span><div style="flex:1"><b>${esc(t.name)}</b>
    <div class="muted">วันที่ ${d} จาก 3 · เริ่ม ${thDate(t.start)}${t.note?` · 📝 ${esc(t.note)}`:''}</div></div>
    <button class="btn sm mint" onclick="trialSet('${t.id}','pass')">ผ่าน ✓</button>
    <button class="btn sm" style="color:var(--red);border-color:var(--red)" onclick="trialSet('${t.id}','fail')">มีอาการ</button></div>`});
  h+='</div>'}
 if(fail.length){h+=`<h4 class="sec">🔴 แพ้ / มีอาการ (${fail.length})</h4><div class="card">`;
  fail.forEach(t=>{h+=`<div class="trow"><span class="dot fail"></span><div style="flex:1"><b>${esc(t.name)}</b>
   <div class="muted">${t.note?esc(t.note):'บันทึกเมื่อ '+thDate(t.start)}</div></div>
   <button class="btn sm ghost" onclick="trialSet('${t.id}','try')">ลองใหม่</button>
   <button class="x" onclick="delTrial('${t.id}')">✕</button></div>`});
  h+='</div>'}
 if(pass.length){h+=`<h4 class="sec">🟢 ผ่านแล้ว กินได้ (${pass.length})</h4><div class="card">`;
  pass.forEach(t=>{h+=`<div class="trow"><span class="dot pass"></span><div style="flex:1"><b>${esc(t.name)}</b>
   <span class="muted"> · ${thDate(t.start)}</span></div><button class="x" onclick="delTrial('${t.id}')">✕</button></div>`});
  h+='</div>'}
 if(!ts.length)h+=`<div class="empty">${svg('i-leaf')}ยังไม่มีบันทึกการลองอาหารใหม่<br>เริ่มจดได้เลยค่ะ</div>`;
 $('#view').innerHTML=h}
function trialForm(){openModal(`<h2>เริ่มลองอาหารใหม่</h2>
 <label class="fl">เลือกวัตถุดิบจากฐานข้อมูล</label>
 <select id="tf-ing" onchange="if(this.value)document.getElementById('tf-name').value=this.options[this.selectedIndex].text.replace(' ⚠️','')">${ingOptions('')}</select>
 <label class="fl">หรือพิมพ์ชื่ออาหารเอง</label>
 <input id="tf-name" placeholder="เช่น แก้วมังกร, ปลาช่อน">
 <label class="fl">วันที่เริ่ม</label>
 <input id="tf-date" type="date" value="${dstr()}">
 <button class="btn pri" style="width:100%;margin-top:13px" onclick="saveTrial()">เริ่มลอง 🌱</button>`)}
function saveTrial(){const name=$('#tf-name').value.trim();
 if(!name){toast('ใส่ชื่ออาหารก่อนนะคะ');return}
 S.trials.push({id:uid(),child:S.active,name,ing:$('#tf-ing').value||null,start:$('#tf-date').value||dstr(),status:'try',note:''});
 save();closeModal();toast('เริ่มลอง '+name+' 🌱');renderNewfood()}
function trialSet(id,st){const t=S.trials.find(x=>x.id===id);if(!t)return;
 if(st==='fail'){const sym=prompt('อาการที่พบ (เช่น ผื่นรอบปาก, ถ่ายเหลว)');if(sym===null)return;t.note=sym||t.note}
 t.status=st;save();
 toast(st==='pass'?'เยี่ยม! เพิ่มในรายการกินได้ 🟢':st==='fail'?'จดไว้แล้ว ระบบจะเตือนเมื่อเมนูมีของที่แพ้':'เริ่มลองใหม่');
 renderNewfood()}
function delTrial(id){if(!confirm('ลบรายการนี้?'))return;S.trials=S.trials.filter(t=>t.id!==id);save();renderNewfood()}

let STAT_MONTH=dstr().slice(0,7);
function renderStats(){const c=child(),t=target();
 const [y,mo]=STAT_MONTH.split('-').map(Number);
 const dim=new Date(y,mo,0).getDate();
 const logs=S.logs.filter(l=>l.child===c.id&&l.date.startsWith(STAT_MONTH));
 const byDay={};logs.forEach(l=>{(byDay[l.date]=byDay[l.date]||[]).push(l)});
 const days=Object.keys(byDay).length;
 let sumK=0,sumP=0,sumFe=0,sumCa=0;const dayK={};
 logs.forEach(l=>{const n=nutOf(l.ings),e=l.eaten??1;
  sumK+=n[0]*e;sumP+=n[1]*e;sumFe+=n[4]*e;sumCa+=n[5]*e;
  dayK[l.date]=(dayK[l.date]||0)+n[0]*e});
 const top={};logs.forEach(l=>top[l.name]=(top[l.name]||0)+1);
 const tops=Object.entries(top).sort((a,b)=>b[1]-a[1]).slice(0,5);
 const reacts=logs.filter(l=>l.react);
 const prevM=()=>{const d=new Date(y,mo-2,1);STAT_MONTH=dstr(d).slice(0,7);renderStats()};
 const nextM=()=>{const d=new Date(y,mo,1);STAT_MONTH=dstr(d).slice(0,7);renderStats()};
 window._pm=prevM;window._nm=nextM;
 let h=`<div class="row between" style="margin-top:10px">
  <button class="btn sm ghost" onclick="_pm()">‹</button><b>📊 ${THM[mo-1]} ${y+543}</b>
  <button class="btn sm ghost" onclick="_nm()" ${STAT_MONTH>=dstr().slice(0,7)?'disabled':''}>›</button></div>`;
 h+=`<div class="card"><div class="kpis">
  <div class="kpi"><b>${days}</b><span>วันที่มีบันทึก</span></div>
  <div class="kpi"><b>${logs.length}</b><span>มื้อที่บันทึก</span></div>
  <div class="kpi"><b>${days?fmt(sumK/days):0}</b><span>กิโลแคลอรีเฉลี่ย/วัน</span></div>
  <div class="kpi"><b>${days?fmt(sumP/days,1):0}</b><span>โปรตีนเฉลี่ย (ก./วัน)</span></div>
  <div class="kpi"><b>${days?fmt(sumFe/days,1):0}</b><span>เหล็กเฉลี่ย (มก./วัน)</span></div>
  <div class="kpi"><b>${days?fmt(sumCa/days):0}</b><span>แคลเซียมเฉลี่ย (มก./วัน)</span></div>
 </div></div>`;
 // กราฟแคลอรีรายวัน
 h+=`<div class="card"><h3>${svg('i-chart','width:19px;color:var(--coral)')} พลังงานรายวัน <span class="muted" style="font-size:11px;font-weight:400">เส้นเป้า ${fmt(t.kcal)} กิโลแคลอรี</span></h3><div class="mchart">`;
 const mx=Math.max(t.kcal*1.2,...Object.values(dayK),1);
 for(let d=1;d<=dim;d++){const ds=STAT_MONTH+'-'+String(d).padStart(2,'0');const k=dayK[ds]||0;
  h+=`<i class="${k<t.kcal*.7?'lo':''}" style="height:${Math.max(2,k/mx*100)}%" title="${d}: ${fmt(k)} kcal" onclick="TODAY_DATE='${ds}';go('today')"></i>`}
 h+=`</div><div class="row between muted" style="font-size:10px"><span>1</span><span>${dim} ${THM[mo-1]}</span></div>
 <div class="muted" style="font-size:11px;margin-top:3px">🟠 = ต่ำกว่า 70% ของเป้า · แตะแท่งเพื่อดูรายวัน</div></div>`;
 if(tops.length){h+=`<div class="card"><h3>${svg('i-star','width:19px;color:var(--sun)')} เมนูยอดฮิตเดือนนี้</h3>`;
  tops.forEach(([n,c2],i)=>{h+=`<div class="row between" style="padding:4px 0;border-bottom:1px dashed #ecdfca"><span>${['🥇','🥈','🥉','4.','5.'][i]} ${esc(n)}</span><b>${c2} ครั้ง</b></div>`});
  h+='</div>'}
 if(reacts.length){h+=`<div class="card" style="border-color:var(--red)"><h3 style="color:var(--red)">⚠️ อาการผิดปกติเดือนนี้</h3>`;
  reacts.forEach(l=>{h+=`<div style="font-size:13px;padding:3px 0">${thDate(l.date)} · <b>${esc(l.name)}</b> — ${esc(l.react)}</div>`});
  h+='</div>'}
 if(!logs.length)h+=`<div class="empty">${svg('i-chart')}เดือนนี้ยังไม่มีบันทึก</div>`;
 $('#view').innerHTML=h}

const WFA_F=[[.3809,3.232,.1417],[.1714,4.187,.1372],[.0962,5.128,.1300],[.0402,5.846,.1262],[-.0050,6.424,.1240],[-.0430,6.899,.1227],[-.0756,7.297,.1220],[-.1039,7.642,.1218],[-.1288,7.949,.1218],[-.1507,8.225,.1220],[-.1700,8.480,.1222],[-.1872,8.719,.1225],[-.2024,8.948,.1227],[-.2158,9.170,.1228],[-.2278,9.387,.1229],[-.2384,9.601,.1230],[-.2478,9.812,.1230],[-.2562,10.023,.1231],[-.2637,10.232,.1231],[-.2703,10.439,.1232],[-.2762,10.646,.1232],[-.2815,10.853,.1234],[-.2862,11.061,.1235],[-.2903,11.269,.1237],[-.2941,11.478,.1239],[-.2975,11.686,.1241],[-.3005,11.895,.1244],[-.3032,12.102,.1247],[-.3057,12.306,.1251],[-.3080,12.507,.1255],[-.3101,12.706,.1259],[-.3120,12.901,.1263],[-.3138,13.093,.1268],[-.3155,13.284,.1274],[-.3171,13.473,.1279],[-.3186,13.662,.1286],[-.3201,13.850,.1292]];
const HFA_M=[[49.88,.0380],[54.72,.0356],[58.42,.0342],[61.43,.0333],[63.89,.0326],[65.90,.0320],[67.62,.0317],[69.16,.0314],[70.60,.0312],[71.97,.0312],[73.28,.0312],[74.54,.0313],[75.75,.0314],[76.92,.0315],[78.05,.0317],[79.15,.0320],[80.21,.0322],[81.25,.0325],[82.26,.0328],[83.24,.0331],[84.20,.0334],[85.13,.0338],[86.05,.0341],[86.94,.0345],[87.12,.0350],[87.97,.0352],[88.81,.0354],[89.62,.0356],[90.41,.0358],[91.18,.0360],[91.93,.0362],[92.66,.0364],[93.38,.0366],[94.07,.0368],[94.75,.0369],[95.42,.0371],[96.08,.0373]];
const HFA_F=[[49.15,.0379],[53.69,.0364],[57.07,.0357],[59.80,.0352],[62.09,.0349],[64.03,.0346],[65.73,.0345],[67.29,.0344],[68.75,.0344],[70.14,.0344],[71.48,.0345],[72.77,.0346],[74.02,.0348],[75.22,.0350],[76.38,.0351],[77.51,.0353],[78.61,.0356],[79.67,.0358],[80.71,.0360],[81.72,.0362],[82.70,.0364],[83.67,.0367],[84.60,.0369],[85.52,.0371],[85.72,.0376],[86.59,.0378],[87.45,.0380],[88.28,.0381],[89.10,.0383],[89.90,.0384],[90.68,.0386],[91.44,.0387],[92.19,.0389],[92.92,.0390],[93.64,.0391],[94.35,.0392],[95.05,.0394]];
function lmsAt(arr,m){m=Math.max(0,Math.min(36,m));const i=Math.floor(m),f=m-i,a=arr[i],b=arr[Math.min(36,i+1)];
 if(a.length===3)return[a[0]+(b[0]-a[0])*f,a[1]+(b[1]-a[1])*f,a[2]+(b[2]-a[2])*f];
 return[1,a[0]+(b[0]-a[0])*f,a[1]+(b[1]-a[1])*f]}
function zscore(x,[L,M,S]){return Math.abs(L)>1e-4?(Math.pow(x/M,L)-1)/(L*S):Math.log(x/M)/S}
function fromZ(z,[L,M,S]){return Math.abs(L)>1e-4?M*Math.pow(1+L*S*z,1/L):M*Math.exp(S*z)}
function ncdf(z){const t=1/(1+.2316419*Math.abs(z)),d=.3989423*Math.exp(-z*z/2);
 const p=d*t*(.3193815+t*(-.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));return z>0?1-p:p}
function ageAtM(c,date){return (new Date(date+'T00:00')-new Date(c.bd+'T00:00'))/864e5/30.4375}
function pctOf(c,date,val,type){const m=ageAtM(c,date);if(m<0||m>37||!val)return null;
 const tab=type==='w'?(c.sex==='f'?WFA_F:WFA_M):(c.sex==='f'?HFA_F:HFA_M);
 const z=zscore(val,lmsAt(tab,m));return{z,p:ncdf(z)*100,m}}
function pLabel(p){return p<1?'<P1':p>99?'>P99':'P'+Math.round(p)}
function interp(p,type){const w=type==='w';
 if(p<3)return[w?'น้อยกว่าเกณฑ์':'เตี้ยกว่าเกณฑ์','#fde3e3','var(--red)'];
 if(p<15)return[w?'ค่อนข้างน้อย':'ค่อนข้างเตี้ย','var(--sun2)','var(--ink)'];
 if(p<=85)return[w?'น้ำหนักตามเกณฑ์':'สูงตามเกณฑ์','var(--mint2)','var(--ink)'];
 if(p<=97)return[w?'ค่อนข้างมาก':'ค่อนข้างสูง','var(--sun2)','var(--ink)'];
 return[w?'มากกว่าเกณฑ์':'สูงกว่าเกณฑ์มาก','#fde3e3','var(--red)']}

function growChart(c,recs,type){
 const tab=type==='w'?(c.sex==='f'?WFA_F:WFA_M):(c.sex==='f'?HFA_F:HFA_M);
 const y0=type==='w'?2:44,y1=type==='w'?20:104;
 const W=340,H=205,pl=30,pr=27,pt=10,pb=20;
 const X=m=>pl+m/36*(W-pl-pr),Y=v=>pt+(1-(v-y0)/(y1-y0))*(H-pt-pb);
 let s=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">`;
 // เส้นกริดแนวนอน
 const step=type==='w'?3:10,gs=Math.ceil(y0/step)*step;
 for(let v=gs;v<=y1;v+=step)s+=`<line x1="${pl}" y1="${Y(v)}" x2="${W-pr}" y2="${Y(v)}" stroke="#efe3d0" stroke-width="1"/><text x="${pl-4}" y="${Y(v)+3}" font-size="8" fill="#9a8270" text-anchor="end">${v}</text>`;
 for(let m=0;m<=36;m+=6)s+=`<text x="${X(m)}" y="${H-6}" font-size="8" fill="#9a8270" text-anchor="middle">${m}</text>`;
 s+=`<text x="${W-pr}" y="${H-6}" font-size="7.5" fill="#9a8270" text-anchor="end" dx="12">ด.</text>`;
 // เส้นโค้งเปอร์เซ็นไทล์
 [[-1.8808,'P3'],[-1.0364,'P15'],[0,'P50'],[1.0364,'P85'],[1.8808,'P97']].forEach(([z,lb])=>{
  let d='';for(let m=0;m<=36;m++)d+=(m?'L':'M')+X(m).toFixed(1)+' '+Y(fromZ(z,lmsAt(tab,m))).toFixed(1);
  s+=`<path d="${d}" fill="none" stroke="${z===0?'var(--mint)':'#d8c7ab'}" stroke-width="${z===0?2:1.1}" ${Math.abs(z)>1.5?'stroke-dasharray="3 3"':''}/>`;
  s+=`<text x="${W-pr+2}" y="${Y(fromZ(z,lmsAt(tab,36)))+3}" font-size="7.5" fill="${z===0?'var(--mint)':'#b39f85'}">${lb}</text>`});
 // จุดของลูก
 const pts=recs.map(r=>({m:ageAtM(c,r.date),v:r[type]})).filter(p=>p.v&&p.m>=0&&p.m<=36.8);
 if(pts.length>1)s+=`<polyline points="${pts.map(p=>X(Math.min(36,p.m)).toFixed(1)+','+Y(p.v).toFixed(1)).join(' ')}" fill="none" stroke="var(--coral)" stroke-width="2"/>`;
 pts.forEach(p=>s+=`<circle cx="${X(Math.min(36,p.m)).toFixed(1)}" cy="${Y(p.v).toFixed(1)}" r="3.4" fill="var(--coral)" stroke="#fff" stroke-width="1.4"/>`);
 return s+'</svg>'}

 if(!c.sex){$('#view').innerHTML=`<div class="card" style="text-align:center;padding:24px 16px">

 const recs=S.growth.filter(g=>g.child===c.id).sort((a,b)=>a.date.localeCompare(b.date));
 const lw=[...recs].reverse().find(r=>r.w),lh=[...recs].reverse().find(r=>r.h);
 let h=`<div style="margin-top:10px"><button class="btn pri" style="width:100%" onclick="growForm()">＋ บันทึกน้ำหนัก/ส่วนสูง</button></div>`;
 // สรุปล่าสุด
 if(lw||lh){h+=`<div class="card"><h3>${svg('i-grow','width:19px;color:var(--mint)')} ล่าสุดของ ${esc(c.name)} (${c.sex==='f'?'หญิง':'ชาย'} · ${ageTxt(ageM(c))})</h3><div class="kpis">`;
  if(lw){const r=pctOf(c,lw.date,lw.w,'w');if(r){const[t,bg,cl]=interp(r.p,'w');
   h+=`<div class="kpi" style="background:${bg}"><b>${lw.w} กก.</b><span>น้ำหนัก · <b style="color:${cl}">${pLabel(r.p)}</b><br>${t}</span></div>`}}

   h+=`<div class="kpi" style="background:${bg}"><b>${lh.h} ซม.</b><span>ส่วนสูง · <b style="color:${cl}">${pLabel(r.p)}</b><br>${t}</span></div>`}}
  h+=`</div><div class="muted" style="font-size:11px;margin-top:6px">เปอร์เซ็นไทล์ เช่น P65 = สูง/หนักกว่าเด็กวัยเดียวกัน 65 จาก 100 คน · ช่วง P15–P85 คือตามเกณฑ์ปกติ</div></div>`}
 // กราฟ
 h+=`<div class="card"><h3>⚖️ น้ำหนักตามอายุ <span class="muted" style="font-size:11px;font-weight:400">(กก.)</span></h3>${growChart(c,recs,'w')}</div>`;
 h+=`<div class="card"><h3>📏 ส่วนสูงตามอายุ <span class="muted" style="font-size:11px;font-weight:400">(ซม.)</span></h3>${growChart(c,recs,'h')}
  <div class="muted" style="font-size:11px;margin-top:4px">ต่ำกว่า 2 ขวบวัดความยาวท่านอน · 2 ขวบขึ้นไปวัดท่ายืน (เส้นมาตรฐานขยับเล็กน้อยที่ 2 ขวบ)</div></div>`;
 // ประวัติ
 if(recs.length){h+=`<div class="card"><h3>📒 ประวัติการวัด</h3>`;
  [...recs].reverse().forEach(r=>{const rw=r.w?pctOf(c,r.date,r.w,'w'):null,rh=r.h?pctOf(c,r.date,r.h,'h'):null;
   h+=`<div class="trow"><div style="flex:1"><b>${thDate(r.date)}</b> <span class="muted">(${ageTxt(Math.floor(Math.max(0,ageAtM(c,r.date))))})</span>
    <div class="muted">${r.w?`⚖️ ${r.w} กก. <b>${rw?pLabel(rw.p):''}</b>`:''} ${r.w&&r.h?' · ':''} ${r.h?`📏 ${r.h} ซม. <b>${rh?pLabel(rh.p):''}</b>`:''}</div></div>
    <button class="btn sm" onclick="growForm('${r.id}')">✏️</button><button class="x" onclick="delGrow('${r.id}')">✕</button></div>`});
  h+='</div>'}
 else h+=`<div class="empty">${svg('i-grow')}ยังไม่มีบันทึกการวัด<br>ชั่งน้ำหนัก-วัดส่วนสูงแล้วมาจดกันค่ะ</div>`;
 h+=`<p class="muted" style="font-size:10.5px;padding:0 4px">อ้างอิง WHO Child Growth Standards 2006 (ค่าโดยประมาณ) · ใช้เพื่อติดตามแนวโน้ม หากกังวลเรื่องการเจริญเติบโตควรปรึกษากุมารแพทย์</p>`;
 $('#view').innerHTML=h}
function setSex(s){child().sex=s;save();renderGrow()}
function growForm(editId){const ed=editId?S.growth.find(g=>g.id===editId):null;
 openModal(`<h2>${ed?'แก้ไขบันทึกการวัด':'บันทึกน้ำหนัก/ส่วนสูง'}</h2>
  <label class="fl">วันที่วัด</label><input id="gf-date" type="date" value="${ed?ed.date:dstr()}" max="${dstr()}" onchange="updGrowPrev()">
  <label class="fl">น้ำหนัก (กก.)</label><input id="gf-w" type="number" step="0.01" min="1" max="35" value="${ed&&ed.w?ed.w:''}" placeholder="เช่น 9.45" oninput="updGrowPrev()">
  <label class="fl">ส่วนสูง/ความยาว (ซม.)</label><input id="gf-h" type="number" step="0.1" min="40" max="120" value="${ed&&ed.h?ed.h:''}" placeholder="เช่น 74.5" oninput="updGrowPrev()">
  <div id="gf-prev"></div>
  <button class="btn pri" style="width:100%;margin-top:13px" onclick="saveGrow('${editId||''}')">💾 บันทึก</button>`);
 updGrowPrev()}
function updGrowPrev(){const el=$('#gf-prev');if(!el)return;const c=child();
 const date=$('#gf-date').value,w=+$('#gf-w').value,h2=+$('#gf-h').value;let t='';
 if(w){const r=pctOf(c,date,w,'w');if(r)t+=`<div class="okbox" style="background:${interp(r.p,'w')[1]}">⚖️ น้ำหนัก <b>${pLabel(r.p)}</b> · ${interp(r.p,'w')[0]} (z=${r.z.toFixed(1)})</div>`}
 if(h2){const r=pctOf(c,date,h2,'h');if(r)t+=`<div class="okbox" style="background:${interp(r.p,'h')[1]}">📏 ส่วนสูง <b>${pLabel(r.p)}</b> · ${interp(r.p,'h')[0]} (z=${r.z.toFixed(1)})</div>`}
 el.innerHTML=t}
function saveGrow(editId){const date=$('#gf-date').value,w=+$('#gf-w').value||null,h=+$('#gf-h').value||null;
 if(!date||(!w&&!h)){toast('ใส่วันที่และน้ำหนักหรือส่วนสูงอย่างน้อย 1 อย่าง');return}
 if(editId)Object.assign(S.growth.find(g=>g.id===editId),{date,w,h});
 else S.growth.push({id:uid(),child:S.active,date,w,h});
 save();closeModal();toast('บันทึกแล้ว 🌱');renderGrow()}
function delGrow(id){if(!confirm('ลบบันทึกนี้?'))return;S.growth=S.growth.filter(g=>g.id!==id);save();renderGrow()}

/* ================= ตั้งค่า / ลูก / ข้อมูล ================= */
function openSettings(){let h=`<h2>⚙️ ตั้งค่า</h2><h4 class="sec">ลูกน้อย</h4>`;
 S.children.forEach(c=>{h+=`<div class="card flat row between" style="margin:6px 0">
  <div><b>👶 ${esc(c.name)}</b><div class="muted">เกิด ${thDate(c.bd)} · ${ageTxt(ageM(c))}</div></div>
  <div><button class="btn sm" onclick="addChildForm('${c.id}')">✏️</button>
  <button class="btn sm" style="color:var(--red);border-color:var(--red)" onclick="delChild('${c.id}')">ลบ</button></div></div>`});
 h+=`<button class="btn sun sm" onclick="addChildForm()">＋ เพิ่มลูก</button>
 <h4 class="sec">ข้อมูล</h4>
 <div class="row">
  <button class="btn sm mint" onclick="exportData()">⬇️ สำรองข้อมูล (ไฟล์)</button>
  <button class="btn sm" onclick="document.getElementById('impfile').click()">⬆️ กู้คืนข้อมูล</button>
 </div>
 <input type="file" id="impfile" accept=".json" style="display:none" onchange="importData(this)">
 <p class="muted" style="font-size:11.5px">ข้อมูลทั้งหมดเก็บในเครื่องนี้เท่านั้น แนะนำสำรองเป็นไฟล์เป็นระยะ</p>
 <h4 class="sec">วิธีติดตั้งเป็นแอป</h4>
 <p class="muted" style="font-size:12.5px">เปิดไฟล์นี้ด้วย Chrome บนมือถือ → เมนู ⋮ มุมขวาบน → "เพิ่มลงในหน้าจอหลัก" จะได้ไอคอนแอปบนหน้าจอ เปิดใช้ได้เหมือนแอปทั่วไป ไม่ต้องใช้เน็ต</p>
 <p class="muted" style="font-size:11px">⚕️ ข้อมูลโภชนาการเป็นค่าประมาณเพื่อการวางแผน ไม่ใช่คำแนะนำทางการแพทย์ หากสงสัยภาวะแพ้รุนแรงหรือการเจริญเติบโต ปรึกษากุมารแพทย์</p>`;
 openModal(h)}
function addChildForm(editId){const ed=editId?S.children.find(c=>c.id===editId):null;
 openModal(`<h2>${ed?'แก้ไขข้อมูลลูก':'เพิ่มลูกน้อย'}</h2>
 <label class="fl">ชื่อเล่น</label><input id="cf-name" value="${ed?esc(ed.name):''}" placeholder="เช่น น้องไอยู">
 <label class="fl">วันเกิด</label><input id="cf-bd" type="date" value="${ed?ed.bd:''}" max="${dstr()}">
 <label class="fl">เพศ (ใช้เทียบกราฟมาตรฐานการเติบโต)</label>
 <div class="seg" id="cf-sex">
  <button data-v="m" class="${ed&&ed.sex==='m'?'on':''}" onclick="segSel(this)">👦 ชาย</button>
  <button data-v="f" class="${ed&&ed.sex==='f'?'on':''}" onclick="segSel(this)">👧 หญิง</button></div>
 <label class="fl">สิ่งที่แพ้ที่ทราบอยู่แล้ว (คั่นด้วยจุลภาค ปล่อยว่างได้)</label>
 <input id="cf-al" value="${ed?esc((ed.allergies||[]).join(', ')):''}" placeholder="เช่น ไข่, นมวัว">
 <button class="btn pri" style="width:100%;margin-top:13px" onclick="saveChild('${editId||''}')">💾 บันทึก</button>`)}
function saveChild(editId){const name=$('#cf-name').value.trim(),bd=$('#cf-bd').value;
 if(!name||!bd){toast('ใส่ชื่อและวันเกิดก่อนนะคะ');return}
 const al=$('#cf-al').value.split(',').map(s=>s.trim()).filter(Boolean);
 const sex=$('#cf-sex .on')?.dataset.v||null;
 if(editId){Object.assign(S.children.find(c=>c.id===editId),{name,bd,allergies:al,sex})}
 else{const id=uid();S.children.push({id,name,bd,allergies:al,sex});S.active=id}
 save();closeModal();toast('บันทึกแล้ว 👶');renderAll()}
function delChild(id){if(!confirm('ลบข้อมูลลูกคนนี้ รวมบันทึกทั้งหมด?'))return;
 S.children=S.children.filter(c=>c.id!==id);S.logs=S.logs.filter(l=>l.child!==id);
 S.trials=S.trials.filter(t=>t.child!==id);delete S.plans[id];
 if(S.active===id)S.active=S.children[0]?.id||null;
 save();closeModal();renderAll()}
function exportData(){const b=new Blob([JSON.stringify(S,null,1)],{type:'application/json'});
 const a=document.createElement('a');a.href=URL.createObjectURL(b);
 a.download='เมนูหนูน้อย-สำรอง-'+dstr()+'.json';a.click();toast('ดาวน์โหลดไฟล์สำรองแล้ว')}
function importData(inp){const f=inp.files[0];if(!f)return;
 const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);
  if(!d.children)throw 0;S=d;load2();save();closeModal();toast('กู้คืนข้อมูลสำเร็จ ✓');renderAll()}
  catch(e){toast('ไฟล์ไม่ถูกต้อง')}};r.readAsText(f)}
function load2(){S.recipes=S.recipes||[];S.trials=S.trials||[];S.plans=S.plans||{};S.logs=S.logs||[];S.growth=S.growth||[];S.ings=S.ings||[];mergeIngs()}
function addToPlanPicker(rid){let h=`<h2>ใส่แผนวันไหน?</h2>`;
 for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()+i);const ds=dstr(d);
  h+=`<div class="row" style="margin:7px 0"><b style="width:90px;font-size:13px">${i===0?'วันนี้':thDate(ds)}</b>`;
  ['br','lu','di','sn'].forEach(mk=>{h+=`<button class="btn sm" onclick="setPlan('${ds}','${mk}','${rid}');toast('ใส่แผนแล้ว 📌')">${MEALS[mk]}</button>`});
  h+='</div>'}
 openModal(h)}

/* ================= เริ่มต้น ================= */
load();renderAll();
/*v2*/
if('serviceWorker' in navigator&&location.protocol.indexOf('http')===0){navigator.serviceWorker.register('./sw.js')}
</script>
</body>
</html>
